context:
  PROJECT_NAME: "Issue #4 功能验证报告"
  APPLICANT_ORG: "测试单位"
  PROJECT_LEADER: "测试员"
  PROJECT_PERIOD: "2026年1月—2026年12月"
sections:
  - id: toc
    placeholder: TOC_SUBDOC
    flag_name: ENABLE_TOC
    enabled: true
    blocks:
      - type: toc_placeholder
        title: "目 录"
    order: 0
  - id: research_content
    placeholder: RESEARCH_CONTENT_SUBDOC
    flag_name: ENABLE_RESEARCH_CONTENT
    enabled: true
    blocks:
      - type: heading
        text: "1.1 OMML 公式测试"
        level: 2
      - type: paragraph
        text: "以下公式应渲染为 Word 原生 OMML 公式（可编辑）："
      - type: formula
        latex: "E = mc^2"
        caption: "公式1：质能方程"
      - type: formula
        latex: "\\sum_{i=1}^{n} x_i = x_1 + x_2 + \\cdots + x_n"
        caption: "公式2：求和公式"
      - type: heading
        text: "1.2 多列布局测试（带 gap_cm）"
        level: 2
      - type: paragraph
        text: "下方为两列布局，列间距 1cm："
      - type: columns
        count: 2
        gap_cm: 1.0
        columns:
          - - type: heading
              text: "左列标题"
              level: 3
            - type: paragraph
              text: "左列正文内容。"
            - type: bullet_list
              items: ["条目A", "条目B"]
          - - type: heading
              text: "右列标题"
              level: 3
            - type: paragraph
              text: "右列正文内容。"
            - type: numbered_list
              items: ["步骤1", "步骤2"]
      - type: heading
        text: "1.3 嵌套表格测试"
        level: 2
      - type: columns
        count: 2
        columns:
          - - type: table
              title: "嵌套表1"
              headers: ["指标", "数值"]
              rows:
                - ["准确率", "95%"]
                - ["召回率", "90%"]
          - - type: paragraph
              text: "右侧说明文字。"
  - id: research_basis
    placeholder: RESEARCH_BASIS_SUBDOC
    flag_name: ENABLE_RESEARCH_BASIS
    enabled: true
    blocks:
      - type: heading
        text: "2.1 团队介绍"
        level: 2
      - type: paragraph
        text: "本课题组具备丰富的研究经验。"
  - id: implementation_plan
    placeholder: IMPLEMENTATION_PLAN_SUBDOC
    flag_name: ENABLE_IMPLEMENTATION_PLAN
    enabled: true
    blocks:
      - type: heading
        text: "3.1 进度安排"
        level: 2
      - type: table
        title: "表1：项目进度"
        headers: ["阶段", "时间", "任务"]
        rows:
          - ["第一阶段", "2026.01-03", "需求分析"]
          - ["第二阶段", "2026.04-06", "模型开发"]
attachments: []
attachments_bundle:
  enabled: true
  placeholder: APPENDICES_SUBDOC
  flag_name: ENABLE_APPENDICES
  page_break_between_attachments: true
  include_attachment_title: true
style_map:
  table: "ResearchTable"
  figure_paragraph: "Figure Paragraph"
  legend: "Legend"
